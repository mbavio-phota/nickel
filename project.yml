name: Nickel
options:
  bundleIdPrefix: dev.mrbavio
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    # Ad-hoc "sign to run locally" — a real signature (and thus an application
    # identifier) is required for Keychain writes even on the simulator. Set your
    # team in Xcode's Signing pane to run on a physical device.
    CODE_SIGN_IDENTITY: "-"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0.0"

targets:
  Nickel:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Nickel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.mrbavio.nickel
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Nickel

  NickelTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NickelTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Nickel

  NickelUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NickelUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Nickel

schemes:
  Nickel:
    build:
      targets:
        Nickel: all
        NickelTests: [test]
        NickelUITests: [test]
    test:
      targets:
        - NickelTests
        - NickelUITests
    run:
      config: Debug
    archive:
      config: Release
